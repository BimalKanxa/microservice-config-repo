# ─── Scheduler ────────────────────────────────────────────────────────────────
log:
  scheduler:
  
    cron: "*/30 * * * * *"
  chunk-size: 100 

# ─── Field Mapping ────────────────────────────────────────────────────────────
field-mapping:
  header-mapping:
    # logId variations
    logid: logId
    transactionid: logId
    txnid: logId
    id: logId

    # correlation
    correlationid: correlationId
    corrid: correlationId

    # journey
    journeyid: journeyId
    journeyname: journeyName
    journeystatus: journeyStatus
    journeycreatedat: journeyCreatedAt

    # timestamp
    timestamp: timestamp
    eventtime: timestamp
    time: timestamp
    createdat: timestamp

    # customer
    customerid: customerId
    userid: customerId
    user: customerId

    # event
    event: event
    eventtype: event

    # status
    status: status

    # retry
    retrycount: retryCount
    retry: retryCount

    # source
    source: source
    service: source
    system: source

    # errors
    reason: reason
    error: reason
    errormessage: reason

    errorcode: errorCode
    code: errorCode

  fetch:
    fallback:
      minutes: 60

# ─── Actuator / Health ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    db:
      enabled: true

